name: tool-for-logo

services:
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      TOOL_FOR_LOGO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TOOL_FOR_LOGO_APPDATA_ROOT: /shared/app-data
      TOOL_FOR_LOGO_UPLOADS_ROOT: /shared/uploads
      TOOL_FOR_LOGO_OUTPUTS_ROOT: /shared/outputs
      TOOL_FOR_LOGO_REPORT_ROOT: /shared/reports
      TOOL_FOR_LOGO_ARCHIVE_ROOT: /shared/archive
      TOOL_FOR_LOGO_HF_CACHE_ROOT: /cache/huggingface
      TOOL_FOR_LOGO_TORCH_CACHE_ROOT: /cache/torch
      TOOL_FOR_LOGO_DEFAULT_BACKEND: ${TOOL_FOR_LOGO_DEFAULT_BACKEND:-diffusers}
    ports:
      - "${TOOL_FOR_LOGO_WEB_PORT:-19130}:8080"
    volumes:
      - "${TOOL_FOR_LOGO_HOST_APPDATA_ROOT:-C:/Codex/workspaces/ToolForLogo/app-data}:/shared/app-data"
      - "${TOOL_FOR_LOGO_HOST_UPLOADS_ROOT:-C:/Codex/workspaces/ToolForLogo/uploads}:/shared/uploads"
      - "${TOOL_FOR_LOGO_HOST_OUTPUTS_ROOT:-C:/Codex/workspaces/ToolForLogo/outputs}:/shared/outputs"
      - "${TOOL_FOR_LOGO_HOST_REPORT_ROOT:-C:/Codex/reports/ToolForLogo}:/shared/reports"
      - "${TOOL_FOR_LOGO_HOST_ARCHIVE_ROOT:-C:/Codex/archive/ToolForLogo}:/shared/archive"
      - "${TOOL_FOR_LOGO_HOST_HF_CACHE_ROOT:-C:/Codex/workspaces/ToolForLogo/cache/huggingface}:/cache/huggingface"
      - "${TOOL_FOR_LOGO_HOST_TORCH_CACHE_ROOT:-C:/Codex/workspaces/ToolForLogo/cache/torch}:/cache/torch"
    depends_on:
      - worker

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    environment:
      TOOL_FOR_LOGO_WORKER_FLAVOR: gpu
      TOOL_FOR_LOGO_RUNTIME_DEFAULTS: /app/config/runtime.defaults.json
      TOOL_FOR_LOGO_APPDATA_ROOT: /shared/app-data
      TOOL_FOR_LOGO_UPLOADS_ROOT: /shared/uploads
      TOOL_FOR_LOGO_OUTPUTS_ROOT: /shared/outputs
      TOOL_FOR_LOGO_REPORT_ROOT: /shared/reports
      TOOL_FOR_LOGO_ARCHIVE_ROOT: /shared/archive
      TOOL_FOR_LOGO_HF_CACHE_ROOT: /cache/huggingface
      TOOL_FOR_LOGO_TORCH_CACHE_ROOT: /cache/torch
      HF_HOME: /cache/huggingface
      TRANSFORMERS_CACHE: /cache/huggingface
      TORCH_HOME: /cache/torch
      TOOL_FOR_LOGO_DEFAULT_BACKEND: ${TOOL_FOR_LOGO_DEFAULT_BACKEND:-diffusers}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    volumes:
      - "${TOOL_FOR_LOGO_HOST_APPDATA_ROOT:-C:/Codex/workspaces/ToolForLogo/app-data}:/shared/app-data"
      - "${TOOL_FOR_LOGO_HOST_UPLOADS_ROOT:-C:/Codex/workspaces/ToolForLogo/uploads}:/shared/uploads"
      - "${TOOL_FOR_LOGO_HOST_OUTPUTS_ROOT:-C:/Codex/workspaces/ToolForLogo/outputs}:/shared/outputs"
      - "${TOOL_FOR_LOGO_HOST_REPORT_ROOT:-C:/Codex/reports/ToolForLogo}:/shared/reports"
      - "${TOOL_FOR_LOGO_HOST_ARCHIVE_ROOT:-C:/Codex/archive/ToolForLogo}:/shared/archive"
      - "${TOOL_FOR_LOGO_HOST_HF_CACHE_ROOT:-C:/Codex/workspaces/ToolForLogo/cache/huggingface}:/cache/huggingface"
      - "${TOOL_FOR_LOGO_HOST_TORCH_CACHE_ROOT:-C:/Codex/workspaces/ToolForLogo/cache/torch}:/cache/torch"
